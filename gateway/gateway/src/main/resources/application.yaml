server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: servicio-productos-service
              uri: http://127.0.0.1:8081
              predicates:
                - Path=/api/v1/productos/**

            - id: servicio-usuario-service
              uri: http://127.0.0.1:8082
              predicates:
                - Path=/api/v1/cliente/**
            
            - id: servicio-ventas-service
              uri: http://127.0.0.1:8083
              predicates:
                - Path=/api/v1/ventas/**

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: Microservicio productos
        url: /servicio-productos/api-docs
      - name: Microservicio usuarios
        url: /servicio-usuarios/api-docs
      - name: Microservicio ventas
        url: /servicio-ventas/api-docs
  api-docs:
    enabled: true
    
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
