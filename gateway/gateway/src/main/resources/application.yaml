server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: servicio-productos-service
              uri: lb://servicio-productos
              predicates:
                - Path=/api/v1/productos/**

            - id: servicio-usuario-service
              uri: lb://servicio-usuarios
              predicates:
                - Path=/api/v1/cliente/**

            - id: servicio-ventas-service
              uri: lb://servicio-ventas
              predicates:
                - Path=/api/v1/ventas/**

            - id: swagger-productos
              uri: lb://servicio-productos
              predicates:
                - Path=/servicio-productos/api-docs

            - id: swagger-usuarios
              uri: lb://servicio-usuarios
              predicates:
                - Path=/servicio-usuarios/api-docs

            - id: swagger-ventas
              uri: lb://servicio-ventas
              predicates:
                - Path=/servicio-ventas/api-docs

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    urls:
      - name: Microservicio productos
        url: /servicio-productos/api-docs
      - name: Microservicio usuarios
        url: /servicio-usuarios/api-docs
      - name: Microservicio ventas
        url: /servicio-ventas/api-docs
  api-docs:
    enabled: true



eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/